<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}NanoLink{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
        rel="stylesheet">

    <style>
        /* ─── CSS Variables ─────────────────────────────────────────── */
        :root {
            --blue: #3b82f6;
            --green: #10b981;
            --blue-dark: #2563eb;
            --green-dark: #059669;
            --text-dark: #0f172a;
            --text-mid: #334155;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --border: rgba(148, 163, 184, 0.2);
            --border-soft: rgba(255, 255, 255, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.82);
            --glass-blur: 18px;
            --radius-lg: 28px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --shadow-card: 0 8px 40px rgba(20, 40, 80, 0.10), 0 1px 0 rgba(255, 255, 255, 0.8) inset;
            --shadow-btn: 0 4px 18px rgba(59, 130, 246, 0.30);
            --shadow-btn-hover: 0 8px 28px rgba(59, 130, 246, 0.42);
            --grad: linear-gradient(135deg, var(--blue) 0%, var(--green) 100%);
            --bg: linear-gradient(135deg, #f0f6ff 0%, #edfaf5 100%);
            --font-display: 'DM Serif Display', Georgia, serif;
            --font-body: 'DM Sans', system-ui, sans-serif;
            --ease-spring: cubic-bezier(.22, 1, .36, 1);
            --ease-pop: cubic-bezier(.34, 1.56, .64, 1);
        }

        /* ─── Reset & Base ──────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-dark);
            background: var(--bg);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Typography ────────────────────────────────────────────── */
        h1,
        h2,
        h3,
        h4 {
            font-family: var(--font-display);
            letter-spacing: -0.3px;
            color: var(--text-dark);
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 2.4rem);
        }

        h2 {
            font-size: clamp(1.4rem, 3vw, 1.9rem);
        }

        h3 {
            font-size: 1.25rem;
        }

        p {
            color: var(--text-muted);
        }

        a {
            color: var(--blue);
            text-decoration: none;
            transition: color .18s;
        }

        a:hover {
            color: var(--blue-dark);
        }

        /* ─── Global Backgrounds ────────────────────────────────────── */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.32;
            pointer-events: none;
            z-index: 0;
        }

        .bg-blob-1 {
            width: 520px;
            height: 520px;
            background: #c7d8f8;
            top: -140px;
            left: -160px;
            animation: drift 12s ease-in-out infinite alternate;
        }

        .bg-blob-2 {
            width: 440px;
            height: 440px;
            background: #b5e4d3;
            bottom: -100px;
            right: -120px;
            animation: drift 14s ease-in-out infinite alternate-reverse;
        }

        .bg-blob-3 {
            width: 260px;
            height: 260px;
            background: #fde8c8;
            top: 38%;
            left: 52%;
            animation: drift 10s ease-in-out infinite alternate;
            animation-delay: -4s;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(32px, 24px) scale(1.1);
            }
        }

        .dot {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }

        .dot-1 {
            width: 10px;
            height: 10px;
            background: var(--blue);
            top: 18%;
            left: 10%;
            animation: floatDot 6s ease-in-out infinite;
        }

        .dot-2 {
            width: 6px;
            height: 6px;
            background: var(--green);
            top: 72%;
            left: 7%;
            animation: floatDot 9s ease-in-out infinite reverse;
        }

        .dot-3 {
            width: 8px;
            height: 8px;
            background: #f59e0b;
            top: 28%;
            right: 9%;
            animation: floatDot 7s ease-in-out infinite 1s;
        }

        .dot-4 {
            width: 12px;
            height: 12px;
            background: var(--green);
            bottom: 22%;
            right: 12%;
            animation: floatDot 8s ease-in-out infinite .5s reverse;
        }

        .dot-5 {
            width: 5px;
            height: 5px;
            background: var(--blue);
            top: 55%;
            right: 22%;
            animation: floatDot 11s ease-in-out infinite 2s;
        }

        @keyframes floatDot {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-16px);
            }
        }

        /* ─── Cards ─────────────────────────────────────────────────── */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
        }

        /* ─── Buttons ───────────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 11px 24px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            transition: transform .18s var(--ease-spring), box-shadow .18s, opacity .18s, background .18s;
            text-decoration: none;
            white-space: nowrap;
            line-height: 1;
        }

        .btn:active {
            transform: scale(0.97) !important;
        }

        .btn-primary {
            background: var(--grad);
            color: #fff;
            box-shadow: var(--shadow-btn);
        }

        .btn-primary:hover {
            color: #fff;
            transform: translateY(-2px);
            box-shadow: var(--shadow-btn-hover);
            opacity: 0.93;
        }

        .btn-ghost {
            background: rgba(59, 130, 246, 0.07);
            color: var(--blue);
            border: 1px solid rgba(59, 130, 246, 0.15);
        }

        .btn-ghost:hover {
            background: rgba(59, 130, 246, 0.13);
            color: var(--blue-dark);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.08);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.18);
            font-size: 0.82rem;
            padding: 7px 14px;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.15);
            transform: translateY(-1px);
        }

        .btn-icon {
            background: rgba(148, 163, 184, 0.12);
            color: var(--text-muted);
            border: 1px solid rgba(148, 163, 184, 0.2);
            padding: 11px 16px;
        }

        .btn-icon:hover {
            background: rgba(148, 163, 184, 0.2);
            transform: translateY(-1px);
        }

        .btn-sm {
            font-size: 0.82rem;
            padding: 8px 16px;
        }

        /* ─── Inputs ────────────────────────────────────────────────── */
        .input-group {
            display: flex;
            gap: 8px;
        }

        input[type="text"],
        input[type="url"],
        input[type="email"],
        input[type="password"] {
            font-family: var(--font-body);
            font-size: 0.93rem;
            color: var(--text-dark);
            background: rgba(255, 255, 255, 0.7);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 11px 15px;
            width: 100%;
            transition: border-color .18s, box-shadow .18s, background .18s;
            outline: none;
            -webkit-appearance: none;
        }

        input:focus {
            border-color: var(--blue);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }

        input[readonly] {
            background: rgba(248, 250, 252, 0.9);
            border-style: dashed;
            color: var(--text-mid);
        }

        input::placeholder {
            color: var(--text-light);
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-mid);
            margin-bottom: 6px;
            letter-spacing: 0.2px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-note {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 5px;
        }

        /* ─── Navbar ────────────────────────────────────────────────── */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 28px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 1px 20px rgba(20, 40, 80, 0.06);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .navbar-logo {
            width: 34px;
            height: 34px;
            background: var(--grad);
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 0.72rem;
            font-family: var(--font-body);
            flex-shrink: 0;
        }

        .navbar-name {
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-dark);
            letter-spacing: -0.2px;
        }

        .navbar-spacer {
            flex: 1;
        }

        .navbar-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            list-style: none;
        }

        .nav-link {
            font-size: 0.87rem;
            font-weight: 500;
            color: var(--text-muted);
            padding: 7px 13px;
            border-radius: var(--radius-xs);
            transition: color .18s, background .18s;
            white-space: nowrap;
        }

        .nav-link:hover {
            color: var(--text-dark);
            background: rgba(59, 130, 246, 0.07);
        }

        .nav-username {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-mid);
            padding: 6px 12px;
            background: rgba(59, 130, 246, 0.06);
            border-radius: 99px;
            border: 1px solid rgba(59, 130, 246, 0.12);
        }

        /* ─── Page Wrapper ──────────────────────────────────────────── */
        .page-content {
            position: relative;
            z-index: 1;
        }

        /* ─── Divider ───────────────────────────────────────────────── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }

        /* ─── Badge ─────────────────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 4px 10px 4px 7px;
            border-radius: 99px;
        }

        .badge-blue {
            background: rgba(59, 130, 246, 0.1);
            color: var(--blue);
            border: 1px solid rgba(59, 130, 246, 0.18);
        }

        /* ─── Animations ────────────────────────────────────────────── */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .anim-slide-up {
            animation: slideUp .5s var(--ease-spring) both;
        }

        .anim-delay-1 {
            animation-delay: .08s;
        }

        .anim-delay-2 {
            animation-delay: .16s;
        }

        .anim-delay-3 {
            animation-delay: .24s;
        }

        .anim-delay-4 {
            animation-delay: .32s;
        }

        /* ─── Utilities ─────────────────────────────────────────────── */
        .text-muted {
            color: var(--text-muted);
        }

        .text-center {
            text-align: center;
        }

        .text-grad {
            color: transparent;
            background: var(--grad);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .d-none {
            display: none !important;
        }

        .d-flex {
            display: flex;
        }

        .align-center {
            align-items: center;
        }

        .gap-2 {
            gap: 8px;
        }

        .gap-3 {
            gap: 12px;
        }

        .w-full {
            width: 100%;
        }

        .mt-1 {
            margin-top: 6px;
        }

        .mt-2 {
            margin-top: 12px;
        }

        .mt-3 {
            margin-top: 20px;
        }

        .mb-2 {
            margin-bottom: 12px;
        }

        .mb-3 {
            margin-bottom: 20px;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .navbar {
                padding: 0 16px;
            }

            .navbar-name {
                display: none;
            }

            .bg-blob-1 {
                width: 300px;
                height: 300px;
            }

            .bg-blob-2 {
                width: 260px;
                height: 260px;
            }

            .bg-blob-3 {
                display: none;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body>
    <!-- Ambient background -->
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
    <div class="dot dot-4"></div>
    <div class="dot dot-5"></div>

    {% block nav %}{% endblock %}

    <div class="page-content">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>

</html>
