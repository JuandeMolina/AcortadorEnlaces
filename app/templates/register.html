{% extends "base.html" %}

{% block title %}Registro — NanoLink{% endblock %}

{% block extra_head %}
<style>
    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .auth-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
    }

    .auth-card {
        width: 100%;
        max-width: 420px;
        padding: 40px 36px 36px;
        animation: slideUp .5s var(--ease-spring) both;
    }

    .auth-brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 28px;
        text-decoration: none;
    }

    .auth-brand-icon {
        width: 36px;
        height: 36px;
        border-radius: var(--radius-xs);
        object-fit: contain;
        box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
    }

    .auth-brand-name {
        font-family: var(--font-body);
        font-weight: 700;
        font-size: 1rem;
        color: var(--text-dark);
        letter-spacing: -0.2px;
    }

    .auth-divider {
        height: 1px;
        background: var(--border);
        margin: 0 0 26px;
    }

    .auth-title {
        font-family: var(--font-display);
        font-size: 1.55rem;
        color: var(--text-dark);
        text-align: center;
        margin-bottom: 6px;
        letter-spacing: -0.3px;
    }

    .auth-subtitle {
        font-size: 0.85rem;
        color: var(--text-muted);
        text-align: center;
        margin-bottom: 28px;
    }

    /* Two-column row for password fields */
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .auth-footer {
        margin-top: 22px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
        font-size: 0.84rem;
        color: var(--text-muted);
        text-align: center;
    }

    .auth-footer a {
        font-weight: 600;
        color: var(--blue);
    }

    @media (max-width: 480px) {
        .auth-card {
            padding: 32px 22px 28px;
        }

        .form-row {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card">

        <a href="{{ url_for('main.index') }}" class="auth-brand">
            <img src="{{ url_for('static', filename='img/icon.svg') }}" alt="NanoLink" class="auth-brand-icon">
            <span class="auth-brand-name">NanoLink</span>
        </a>

        <div class="auth-divider"></div>

        <h1 class="auth-title">Crear una cuenta</h1>
        <p class="auth-subtitle">Guarda y gestiona todos tus enlaces acortados.</p>

        <form method="POST">
            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" name="username" placeholder="tu_usuario" required>
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="password_confirm">Confirmar</label>
                    <input type="password" id="password_confirm" name="password_confirm" placeholder="••••••••"
                        required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-full" style="margin-top: 4px;">
                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                </svg>
                Crear cuenta
            </button>
        </form>

        <div class="auth-footer">
            ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión</a>
        </div>

    </div>
</div>
{% endblock %}
